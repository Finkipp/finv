{% extends "inventory/base.html" %}
{% block content %}
<div class="page-header">
    <h1>{% if form.instance.pk %}✏️ Редактировать{% else %}➕ Добавить{% endif %} списание</h1>
    <a href="{% url 'writeoff_list' %}" class="btn btn-outline">← Назад</a>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label>{{ form.object_type.label }}</label>
                {{ form.object_type }}
            </div>
            <div class="form-group">
                <label>{{ form.name.label }}</label>
                {{ form.name }}
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>{{ form.status.label }}</label>
                {{ form.status }}
            </div>
            <div class="form-group">
                <label>{{ form.final_date.label }}</label>
                {{ form.final_date }}
            </div>
        </div>
        <div class="form-group">
            <label>{{ form.reason.label }}</label>
            {{ form.reason }}
        </div>
        <button type="submit" class="btn btn-primary">💾 Сохранить</button>
    </form>
</div>
{% endblock %}
